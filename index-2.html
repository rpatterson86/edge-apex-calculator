<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EDGE Apex Calculator v2.3</title>
<style>
:root{color-scheme:light dark;--bg:#0f172a;--card:#111827;--text:#f9fafb;--muted:#9ca3af;--accent:#60a5fa;--field:#1f2937;--border:#374151;--danger:#f87171}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:radial-gradient(circle at top,#1e293b,var(--bg));color:var(--text);min-height:100vh}
.app{width:min(100%,560px);margin:0 auto;padding:22px}
.card{margin-top:16px;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.eyebrow{color:var(--accent);font-size:.85rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
h1{margin:8px 0 20px;font-size:clamp(1.8rem,8vw,3rem);line-height:1}
.tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:var(--field);border:1px solid var(--border);border-radius:18px;padding:6px;margin-bottom:18px}
.tab{padding:12px 10px;border-radius:13px;background:transparent;color:var(--muted);border:0;font-size:1rem;font-weight:800}
.tab.active{background:var(--accent);color:#06111f}
.note{color:var(--muted);margin:6px 0 18px}
label{display:block;margin:18px 0 8px;color:var(--muted);font-weight:700}
.control{display:grid;grid-template-columns:48px 1fr 48px 46px;gap:8px;align-items:center}
.control button{height:48px;border:1px solid var(--border);border-radius:14px;background:var(--field);color:var(--text);font-size:1.4rem;font-weight:900}
input{height:48px;border:1px solid var(--border);border-radius:14px;background:var(--field);color:var(--text);font-size:1.45rem;font-weight:800;text-align:center;width:100%}
.unit{color:var(--muted);font-weight:800}
.action{width:100%;margin-top:20px;border:0;border-radius:16px;padding:16px;background:var(--accent);color:#06111f;font-size:1.08rem;font-weight:900}
.secondary{background:transparent;color:var(--accent);border:1px solid var(--border)}
.result{margin-top:24px;padding:22px;border-radius:20px;background:#020617;border:1px solid var(--border);text-align:center}
.result-label{color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.result-value{margin-top:8px;font-size:clamp(2.4rem,12vw,4rem);font-weight:950}
.error{color:var(--danger)!important;font-size:1.55rem!important}
details{margin-top:20px;color:var(--muted)}
details.settings{padding:14px;border:1px solid var(--border);border-radius:16px}
summary{cursor:pointer;font-weight:800}
.hidden{display:none}
@media (prefers-color-scheme:light){
:root{--bg:#e5e7eb;--card:#fff;--text:#111827;--muted:#6b7280;--field:#f3f4f6;--border:#d1d5db;--accent:#2563eb;--danger:#b91c1c}
body{background:linear-gradient(#f8fafc,var(--bg))}.result{background:#f8fafc}.tab.active,.action{color:#fff}
}
</style>
</head>
<body>
<main class="app"><section class="card">
<div class="eyebrow">Tradesman EDGE Apex</div>
<h1>Calculator v2.3</h1>

<div class="tabs">
<button class="tab active" id="tabProjection">Projection</button>
<button class="tab" id="tabGrip">Grip Length</button>
</div>

<section id="projectionPanel">
<p class="note">Bevel Angle + Grip Length → Projection</p>
<label>Bevel Angle</label>
<div class="control"><button onclick="stepValue('angleP',-0.5)">−</button><input id="angleP" value="15"><button onclick="stepValue('angleP',0.5)">+</button><span class="unit">°</span></div>
<label>Grip Length</label>
<div class="control"><button onclick="stepValue('grip',-1)">−</button><input id="grip" value="80"><button onclick="stepValue('grip',1)">+</button><span class="unit">mm</span></div>
<button class="action" onclick="calcProjection()">Calculate Projection</button>
<div class="result"><div class="result-label">Projection</div><div id="projectionResult" class="result-value">154.5 mm</div></div>
</section>

<section id="gripPanel" class="hidden">
<p class="note">Bevel Angle + Projection → Grip Length</p>
<label>Bevel Angle</label>
<div class="control"><button onclick="stepValue('angleG',-0.5)">−</button><input id="angleG" value="15"><button onclick="stepValue('angleG',0.5)">+</button><span class="unit">°</span></div>
<label>Projection</label>
<div class="control"><button onclick="stepValue('projection',-1)">−</button><input id="projection" value="154.5"><button onclick="stepValue('projection',1)">+</button><span class="unit">mm</span></div>
<button class="action" onclick="calcGrip()">Calculate Grip Length</button>
<div class="result"><div class="result-label">Grip Length</div><div id="gripResult" class="result-value">80.0 mm</div></div>
</section>

<details class="settings">
<summary>Settings</summary>
<label>Wheel Diameter</label>
<div class="control"><button onclick="stepValue('wheel',-1)">−</button><input id="wheel" value="250"><button onclick="stepValue('wheel',1)">+</button><span class="unit">mm</span></div>
<label>Support Bar Diameter</label>
<div class="control"><button onclick="stepValue('support',-0.5)">−</button><input id="support" value="12"><button onclick="stepValue('support',0.5)">+</button><span class="unit">mm</span></div>
<button class="action secondary" onclick="resetDefaults()">Reset Defaults</button>
</details>

<button class="action" onclick="copyResult()">Copy Result</button>

<details><summary>About</summary><p>Version 2.3 uses custom +/− controls for iPhone compatibility.</p></details>
</section></main>

<script>
var currentMode="projection";
var currentResult="Projection: 154.5 mm";
var BASE_SUPPORT_RADIUS=6, BASE_OFFSET=154.43, BASE_END_OFFSET=14.11;

function n(id){return parseFloat(document.getElementById(id).value);}
function setN(id,v){document.getElementById(id).value=(Math.round(v*10)/10).toString();}
function stepValue(id,step){var v=n(id); if(!isFinite(v)) v=0; setN(id,v+step); if(currentMode==="projection") calcProjection(); else calcGrip();}
function constants(){var sr=n("support")/2; var d=sr-BASE_SUPPORT_RADIUS; return {distanceOffset:BASE_OFFSET+d,endOffset:BASE_END_OFFSET-d};}
function show(el,label,v){el.className="result-value"; el.textContent=v.toFixed(1)+" mm"; currentResult=label+": "+v.toFixed(1)+" mm";}
function err(el,msg){el.className="result-value error"; el.textContent=msg;}
function common(el){var w=n("wheel"), s=n("support"); if(!isFinite(w)||w<200||w>300){err(el,"Wheel 200–300 mm");return false;} if(!isFinite(s)||s<8||s>20){err(el,"Support 8–20 mm");return false;} return true;}

function projectionFromGrip(angle,grip){var r=n("wheel")/2,a=angle*Math.PI/180,c=constants(); return Math.sqrt(Math.pow(grip+c.distanceOffset,2)-Math.pow(r*Math.cos(a),2))-r*Math.sin(a)-c.endOffset;}
function gripFromProjection(angle,projection){var r=n("wheel")/2,a=angle*Math.PI/180,c=constants(); return Math.sqrt(Math.pow(projection+c.endOffset+r*Math.sin(a),2)+Math.pow(r*Math.cos(a),2))-c.distanceOffset;}

function calcProjection(){var out=document.getElementById("projectionResult"), a=n("angleP"), g=n("grip"); if(!common(out))return; if(!isFinite(a)||a<5||a>35){err(out,"Angle 5–35°");return;} if(!isFinite(g)||g<40||g>120){err(out,"Grip 40–120 mm");return;} show(out,"Projection",projectionFromGrip(a,g));}
function calcGrip(){var out=document.getElementById("gripResult"), a=n("angleG"), p=n("projection"); if(!common(out))return; if(!isFinite(a)||a<5||a>35){err(out,"Angle 5–35°");return;} if(!isFinite(p)||p<80||p>230){err(out,"Projection 80–230 mm");return;} show(out,"Grip Length",gripFromProjection(a,p));}

function switchTo(mode){currentMode=mode; document.getElementById("projectionPanel").className=mode==="projection"?"":"hidden"; document.getElementById("gripPanel").className=mode==="grip"?"":"hidden"; document.getElementById("tabProjection").className=mode==="projection"?"tab active":"tab"; document.getElementById("tabGrip").className=mode==="grip"?"tab active":"tab"; if(mode==="projection")calcProjection(); else calcGrip();}
function resetDefaults(){setN("angleP",15);setN("grip",80);setN("angleG",15);setN("projection",154.5);setN("wheel",250);setN("support",12); if(currentMode==="projection")calcProjection(); else calcGrip();}
function copyResult(){if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(currentResult).catch(function(){alert(currentResult);});}else{alert(currentResult);}}

document.getElementById("tabProjection").onclick=function(){switchTo("projection");};
document.getElementById("tabGrip").onclick=function(){switchTo("grip");};
["angleP","grip","angleG","projection","wheel","support"].forEach(function(id){
 document.getElementById(id).addEventListener("input",function(){ if(currentMode==="projection")calcProjection(); else calcGrip(); });
 document.getElementById(id).addEventListener("change",function(){ if(currentMode==="projection")calcProjection(); else calcGrip(); });
});
calcProjection();
</script>
</body>
</html>
